<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>꽃 소유자 검색(JSON)</title>
<style>
body{font-family:Arial;background:#f5f5f5;padding:20px}
.box{max-width:650px;margin:auto;background:#fff;padding:20px;border-radius:12px}
input,button{width:100%;padding:12px;margin-top:10px;box-sizing:border-box}
button{background:#4caf50;color:#fff;border:none;border-radius:8px}
.card{margin-top:15px;padding:15px;background:#eef9ee;border-left:5px solid #4caf50}
.err{color:#c00;margin-top:15px}
</style>
</head>
<body>
<div class="box">
<h2>🌸 애진화방의 모든 꽃</h2>
<input id="q" placeholder="꽃 이름 입력">
<button onclick="searchFlower()">검색</button>
<div id="out"></div>
</div>

<script>
const SHEET_ID="1HwHxN8xPGIiNss8EwSetaY9u7IYE6vtQcqKdvTlzHQw";
const URL=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

let table=null;
const norm=s=>(s||"").replace(/\s+/g,"").trim();

async function load(){
 if(table) return;
 const txt=await (await fetch(URL)).text();
 const json=JSON.parse(txt.substring(47,txt.length-2));
 table=json.table.rows;
}

async function searchFlower(){
 const out=document.getElementById("out");
 out.innerHTML="불러오는 중...";
 await load();

 const key=norm(document.getElementById("q").value);
 if(!key){out.innerHTML="<div class='err'>꽃 이름을 입력하세요.</div>";return;}

 let owners=[];
 let flower="";

 for(let r=1;r<table.length;r++){
   const cells=table[r].c;
   if(norm(cells[0]?.v)==key){
      flower=cells[0].v;
      const header=table[0].c;
      for(let c=1;c<header.length;c++){
         const mark=(cells[c]?.v||"").toString().trim();
         if(["O","o","○","◯","⭕","TRUE"].includes(mark)){
            owners.push(header[c]?.v||"");
         }
      }
      break;
   }
 }

 if(!flower){
   out.innerHTML="<div class='err'>검색 결과가 없습니다.</div>";
   return;
 }

 out.innerHTML=`<div class="card"><h3>${flower}</h3><b>소유자</b><br>${owners.length?owners.join("<br>"):"없음"}</div>`;
}

document.getElementById("q").addEventListener("keydown",e=>{if(e.key==="Enter")searchFlower();});
</script>
</body>
</html>
